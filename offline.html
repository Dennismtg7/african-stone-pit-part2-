<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stone Pit – Offline</title>
<style>
  :root{--bg:#0b0c1a;--accent:#f5c518;--blue:#29b6f6;--txd:#7986cb;--gy:rgba(245,197,24,.35);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100dvh;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 70% 50% at 50% 0%,rgba(41,182,246,.08) 0%,transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 100%,rgba(245,197,24,.06) 0%,transparent 60%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Segoe UI',system-ui,sans-serif;color:#e8eaf6;
    text-align:center;padding:24px;
    user-select:none;
  }
  .icon{font-size:5rem;margin-bottom:20px;filter:drop-shadow(0 0 24px rgba(245,197,24,.5));animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  h1{
    font-size:clamp(1.4rem,5vw,2rem);font-weight:900;
    color:var(--accent);letter-spacing:.06em;
    text-shadow:0 0 30px var(--gy);margin-bottom:10px;
  }
  .sub{font-size:.82rem;color:var(--txd);letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px;}
  .card{
    background:rgba(20,22,41,.9);
    border:1.5px solid rgba(245,197,24,.18);
    border-radius:20px;padding:24px 28px;
    max-width:340px;width:100%;
    box-shadow:0 8px 40px rgba(0,0,0,.6);
    display:flex;flex-direction:column;gap:14px;
  }
  .info-row{display:flex;align-items:center;gap:12px;text-align:left;}
  .info-ico{font-size:1.4rem;flex-shrink:0;}
  .info-txt{font-size:.78rem;color:#b0bec5;line-height:1.5;}
  .info-txt strong{color:var(--accent);}
  .divider{height:1px;background:rgba(245,197,24,.12);}
  .retry-btn{
    width:100%;padding:13px;border-radius:14px;border:none;
    background:linear-gradient(135deg,#f5c518 0%,#ff6b35 100%);
    color:#0b0c1a;font-weight:800;font-size:.88rem;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
    transition:all .2s;box-shadow:0 4px 18px rgba(245,197,24,.3);
  }
  .retry-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,197,24,.4);}
  .retry-btn:active{transform:scale(.97);}
  .status{font-size:.68rem;color:var(--txd);margin-top:4px;}
  .status.online{color:#00e676;}
</style>
</head>
<body>

<div class="icon">🪨</div>
<h1>Stone Pit</h1>
<div class="sub">You're offline</div>

<div class="card">
  <div class="info-row">
    <div class="info-ico">📶</div>
    <div class="info-txt">No internet connection detected. Check your Wi-Fi or mobile data.</div>
  </div>
  <div class="divider"></div>
  <div class="info-row">
    <div class="info-ico">🤖</div>
    <div class="info-txt"><strong>Good news:</strong> Once you've opened the game once, you can play <strong>vs AI</strong> and <strong>2-Player local</strong> mode fully offline!</div>
  </div>
  <div class="info-row">
    <div class="info-ico">🌐</div>
    <div class="info-txt"><strong>Online mode</strong> and <strong>M-Pesa payments</strong> require an internet connection.</div>
  </div>
  <div class="divider"></div>
  <button class="retry-btn" onclick="retry()">↺ Try Again</button>
  <div class="status" id="status">Checking connection…</div>
</div>

<script>
function retry(){
  document.getElementById('status').textContent='Checking…';
  document.getElementById('status').className='status';
  fetch('/index.html',{cache:'no-store'})
    .then(()=>{ window.location.href='/index.html'; })
    .catch(()=>{
      document.getElementById('status').textContent='Still offline. Try again later.';
      document.getElementById('status').className='status';
    });
}

// Auto-detect when connection returns
window.addEventListener('online',()=>{
  document.getElementById('status').textContent='✓ Connection restored! Redirecting…';
  document.getElementById('status').className='status online';
  setTimeout(()=>{ window.location.href='/index.html'; },1200);
});
window.addEventListener('offline',()=>{
  document.getElementById('status').textContent='Still offline.';
});

// Initial check
if(navigator.onLine){
  document.getElementById('status').textContent='✓ Connection available — tap Try Again';
  document.getElementById('status').className='status online';
} else {
  document.getElementById('status').textContent='No connection detected.';
}
</script>
</body>
</html>
